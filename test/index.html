<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>测试</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;padding:10px;background:#faf6ed}
.test{background:#fff;border:1px solid #ddd;padding:10px;margin:5px 0}
.sec{font-size:10px;font-weight:600;color:#7a6e64;padding:8px 0}
.note{background:#f8f0e0;padding:10px;font-size:12px;margin:8px 0}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.fg label{font-size:10px;display:block}
.fg select{width:100%;font-size:12px;padding:8px}
.btn{width:100%;padding:13px;background:#1a1410;color:#c4a050;border:none;font-size:14px}
</style>
</head>
<body>
<h3>本位战略 · 心性图谱 - 移动端测试</h3>
<div class="test">
  <div class="sec">输入时空坐标</div>
  <div class="note">这是测试文字。如果你的iPhone能正常显示这段中文，说明基本渲染没问题。原局即"喜怒哀乐之未发谓之中"——你来到世上携带的不变体性。</div>
  <div class="sec">公历自动推演</div>
  <div class="grid">
    <div class="fg"><label>出生年</label><select><option>1985年</option></select></div>
    <div class="fg"><label>出生月</label><select><option>6月</option></select></div>
    <div class="fg"><label>出生日</label><input value="15"></div>
    <div class="fg"><label>性别</label><select><option>男</option></select></div>
  </div>
  <button class="btn">推演心性图谱 →</button>
</div>
<div class="test">
  <div class="sec">图谱四柱</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;text-align:center">
    <div><div style="font-size:9px">年柱天干</div><div style="font-size:21px;background:#3a7d44;color:#fff;padding:10px;border-radius:13px">甲</div></div>
    <div><div style="font-size:9px">月柱天干</div><div style="font-size:21px;background:#c44a3a;color:#fff;padding:10px;border-radius:13px">丙</div></div>
    <div><div style="font-size:9px">日柱天干</div><div style="font-size:21px;background:#a07830;color:#fff;padding:10px;border-radius:13px">戊</div></div>
    <div><div style="font-size:9px">时柱天干</div><div style="font-size:21px;background:#2a5d8a;color:#fff;padding:10px;border-radius:13px">壬</div></div>
  </div>
</div>
<p style="font-size:10px;color:#999;text-align:center">如果你能看到以上中文内容且无乱码，说明基本渲染正常。</p>
</body>
</html>
